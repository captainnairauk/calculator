<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="display">
            <div class="upper-display"></div>
            <div class="lower-display"></div>
        </div>                  
        <div class="delete-container">
            <button data-key="27" id="AC">AC</button>
            <button data-key="8" ID="undo">UNDO</button>
        </div>
        <div class="key-container">
            <button data-key="55" class="key">7</button>
            <button data-key="56" class="key">8</button>
            <button data-key="57" class="key">9</button>
            <button data-key="191" class="operator">÷</button>
            <button data-key="52" class="key">4</button>
            <button data-key="53" class="key">5</button>
            <button data-key="54" class="key">6</button>
            <button data-key="56" class="operator">x</button>
            <button data-key="49" class="key">1</button>
            <button data-key="50" class="key">2</button>
            <button data-key="51" class="key">3</button>
            <button data-key="173" class="operator">-</button>
            <button data-key="190" class="key" id="decimal">.</button>
            <button data-key="48" class="key">0</button>
            <button data-key="13" class="operator">=</button>
            <button data-key="61" class="operator">+</button>
        </div>
    </div>

    <footer>Copyright &copy 2022 captainnairauk <a href="https://github.com/captainnairauk" target="_blank"><img
                src="./images/github.png" alt="git-logo"></a> </footer>


</body>

</html>
